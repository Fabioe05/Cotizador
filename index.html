<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Crypto</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="container">
        <img src="./assets/undraw_crypto-portfolio_mf2i.svg" alt="">
        <div id="coin-container">
            <form id="coin-form">

                <div class="coin-input-container">
                    <label for="coin">ELIGE TU MONEDA</label>
                    <select class="coin-input" id="coin">
                        <option selected disabled value="">Selecciona una moneda</option>
                        <option value="USD">Dolar</option>
                        <option value="EUR">Euro</option>
                        <option value="ARS">Pesos Argentinos</option>
                        <option value="VES">Bolivares</option>
                    </select>
                </div>
                <div class="coin-input-container">
                    <label for="crypto">ELIGE TU CRYPTOMONEDA</label>
                    <select class="coin-input" id="crypto">
                    <option selected disabled value="">Selecciona una moneda</option>
                    <option value="BTC">Bitcoin</option>
                    <option value="ETH">Etherium</option>
                    <option value="AXS">AXS</option>
                    <option value="BNB">Binance</option>
                    <option value="THETA">Theta</option>
                </select>
            </div>
            <div class="coin-input-container">
                <label for="crypto">INGRESA UN MONTO</label>
                <input type="number" class="coin-input" id="amount" placeholder="Monto">
            </div>
            <button id="form-btn" type="submit">COTIZAR</button>
            <div id="coin-info"></div>
        </div>
        
    </form>
    </div>
    <footer class="main-footer">
        <p>Desarrollado por
            <a href="https://github.com/Fabioe05/Cotizador" target="_blank">Fabio Espinoza</a>
        </p>
    </footer>

    <script src="./index.js"></script>
</body>

</html>
