<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div id="container">
        <img src="./assets/undraw_crypto-portfolio_mf2i.svg" alt="">
        <div id="coin-container">
            <form id="coin-form"></form>
            <div class="coin-input-container">
                <label for="coin">ELIGE TU MONEDA</label>
                <select class="coin-input" id="coin">
                    <option selected disabled value="">Selecciona una moneda</option>
                    <option value="USD">Dolar</option>
                    <option value="EUR">Euro</option>
                    <option value="ARS">Pesos Argentinos</option>
                    <option value="VES">Bolivares</option>
                </select>
            </div>
            <div class="coin-input-container">
                <label for="crypto">ELIGE TU CRYPTO</label>
                <select class="crypto-input" id="crypto">
                    <option selected disabled value="">Selecciona una moneda</option>
                    <option value="BTC">Bitcoin</option>
                    <option value="ETH">Etherium</option>
                    <option value="AXS">AXS</option>
                    <option value="BNB">Binance</option>
                </select>
            </div>
            <div class="coin-input-container">
                <label for="crypto">INGRESA UN MONTO</label>
                <input type="number" class="coin-input" id="amount" placeholder="Monto">
            </div>
            <button id="form-btn" type="submit">COTIZAR</button>
            <div id="coin-info">
                <p class="info">El precio es: <span class="price">1400$</span></p>
                <p class="info">El precio mas alto es: <span class="price">1400$</span></p>
                <p class="info">El precio mas bajo es: <span class="price">1400$</span></p>
                <p class="info">Variacion 24H: <span class="price">5%</span></p>
                <p class="info">Puede comprar<span class="price">1.5</span></p>

            </div>
            



        </div>

    </div>

    <script src="./index.js"></script>
</body>

</html>
